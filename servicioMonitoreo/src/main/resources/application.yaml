
weatherapi:
  base-url: https://api.weatherapi.com/v1
  key: ${WEATHER_API_KEY}
  location: Buenos Aires

spring:
  application:
    name: servicioMonitoreo
  task:
    scheduling:
      pool:
        size: 2
      thread-name-prefix: climalert-scheduler-
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
